name: Release

# Manual, tag-driven release. Bump the version with
# `bun scripts/bump-version.mjs <patch|minor|major|x.y.z>`, commit, then push a
# `vX.Y.Z` tag — that push triggers this workflow. See RELEASING.md.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Fail fast if the pushed tag does not match tauri.conf.json (the version
  # source of truth). Prevents shipping a bundle whose in-app version lies.
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag == tauri.conf.json version
        id: check
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "v$VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME != tauri.conf.json v$VERSION — run bump-version.mjs first"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # Desktop bundles. tauri-action creates (or reuses) the GitHub Release for the
  # pushed tag and uploads each platform's installers to it.
  desktop:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "."
          cache-on-failure: true

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      # beforeBuildCommand (in tauri.conf.json) fetches wintun.dll, builds+stages
      # the elevated helper sidecar, and builds the frontend before bundling.
      - name: Build & publish desktop bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: bunx tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Yellow VPN v${{ needs.validate.outputs.version }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # Signed Android APK. Built on the desktop job's release so it uploads into the
  # same GitHub Release.
  android:
    needs: [validate, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4

      - name: Use runner's preinstalled NDK
        run: echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "."
          cache-on-failure: true

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Materialize keystore
        working-directory: src-tauri/gen/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > release.jks
          cat > keystore.properties <<EOF
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          storeFile=release.jks
          EOF

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Build signed APK (arm64)
        run: |
          node scripts/build-android-engine.mjs --release
          bunx tauri android build --apk --target aarch64

      - name: Upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(find src-tauri/gen/android -path '*/release/*-release.apk' | head -n1)
          if [ -z "$APK" ]; then echo "::error::no signed release APK found"; exit 1; fi
          cp "$APK" "yellow-vpn-${{ needs.validate.outputs.version }}-arm64.apk"
          gh release upload "$GITHUB_REF_NAME" \
            "yellow-vpn-${{ needs.validate.outputs.version }}-arm64.apk" --clobber

      - name: Clean up keystore
        if: always()
        working-directory: src-tauri/gen/android
        run: rm -f release.jks keystore.properties
