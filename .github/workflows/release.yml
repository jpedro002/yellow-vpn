name: Release

# Auto-release on push to master. Bump the version with
# `bun scripts/bump-version.mjs <patch|minor|major|x.y.z>`, commit, and push to
# master — the `check` job releases only when tauri.conf.json's version is
# higher than the latest vX.Y.Z tag. See RELEASING.md.
#
# Why push-to-master instead of tag-triggered: GitHub Actions cache is scoped by
# ref, and a cache written on a tag ref is NOT restorable from a sibling tag.
# Only default-branch (master) caches are shared to every run. Building on master
# lets rust-cache/gradle actually reuse their caches across releases.
on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  # Gate: release only when the version in tauri.conf.json (the source of truth)
  # is strictly higher than the highest existing vX.Y.Z tag. Every other push to
  # master runs this cheap job and stops here.
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version bumped past latest tag
        id: check
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          LAST=$(git tag -l 'v*' | sed 's/^v//' | sort -V | tail -n1)
          if [ -z "$LAST" ]; then
            echo "No prior tag — releasing $VERSION."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HIGHEST=$(printf '%s\n%s\n' "$VERSION" "$LAST" | sort -V | tail -n1)
          if [ "$VERSION" != "$LAST" ] && [ "$HIGHEST" = "$VERSION" ]; then
            echo "Version $VERSION > $LAST — releasing."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION <= $LAST — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      # Create the tag up front (matches the old tag-first behavior) so the
      # matrix desktop jobs all attach to one existing tag. Trigger is
      # branches-only, so pushing this tag does NOT re-run the workflow.
      - name: Create and push tag
        if: steps.check.outputs.should_release == 'true'
        run: |
          git tag "v${{ steps.check.outputs.version }}"
          git push origin "v${{ steps.check.outputs.version }}"

  # Desktop bundles. tauri-action creates (or reuses) the GitHub Release for the
  # tag and uploads each platform's installers to it.
  desktop:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          # Intel bundle. Built NATIVELY on the Intel-host runner: cross-compiling
          # x86_64 on the arm64 runner produced a binary that ran under Rosetta
          # but hung at launch on real Intel hardware (no window). The old
          # macos-13 Intel image was retired (Dec 2025); macos-15-intel is its
          # replacement native x86_64 runner. (Apple/GitHub will drop Intel
          # entirely after the macOS 15 image retires ~Fall 2027.)
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: ""
    runs-on: ${{ matrix.platform }}
    # prepare-helper.mjs (run via beforeBuildCommand) builds the sidecar for this
    # triple, so a cross-compiled bundle gets a matching-arch helper.
    env:
      HELPER_TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "."
          cache-on-failure: true

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      # beforeBuildCommand (in tauri.conf.json) fetches wintun.dll, builds+stages
      # the elevated helper sidecar, and builds the frontend before bundling.
      - name: Build & publish desktop bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: bunx tauri
          tagName: "v${{ needs.check.outputs.version }}"
          releaseName: "Yellow VPN v${{ needs.check.outputs.version }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # Signed Android APK. Built on the desktop job's release so it uploads into the
  # same GitHub Release.
  android:
    needs: [check, desktop]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4

      - name: Use runner's preinstalled NDK
        run: echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "."
          cache-on-failure: true

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Materialize keystore
        working-directory: src-tauri/gen/android/app
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > release.jks
          cat > keystore.properties <<EOF
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          storeFile=release.jks
          EOF

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Build signed APK (arm64)
        run: |
          node scripts/build-android-engine.mjs --release
          bunx tauri android build --apk --target aarch64

      - name: Upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: "v${{ needs.check.outputs.version }}"
        run: |
          APK=$(find src-tauri/gen/android -path '*/release/*-release.apk' | head -n1)
          if [ -z "$APK" ]; then echo "::error::no signed release APK found"; exit 1; fi
          cp "$APK" "yellow-vpn-${{ needs.check.outputs.version }}-arm64.apk"
          gh release upload "$TAG" \
            "yellow-vpn-${{ needs.check.outputs.version }}-arm64.apk" --clobber

      - name: Clean up keystore
        if: always()
        working-directory: src-tauri/gen/android/app
        run: rm -f release.jks keystore.properties
